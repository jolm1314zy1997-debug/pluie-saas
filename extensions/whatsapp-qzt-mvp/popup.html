<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: #fffaf3;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 15px;
      }
      p {
        margin: 0 0 12px;
        color: #6b7280;
        font-size: 12px;
        line-height: 1.45;
      }
      button {
        width: 100%;
        margin-top: 8px;
        border: 0;
        border-radius: 9px;
        padding: 9px 10px;
        color: white;
        background: #7c4a1e;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        color: #374151;
        background: #fff;
        border: 1px solid #e5e7eb;
      }
      #status {
        margin-top: 10px;
        min-height: 16px;
        font-size: 12px;
        line-height: 1.35;
        color: #6b7280;
      }
      #status.ok {
        color: #047857;
      }
      #status.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>QZT WhatsApp Extractor</h1>
    <p>如果右下角浮窗没有出现，用这里的按钮手动抓取当前聊天。</p>
    <button id="send">抓取并打开销售助手</button>
    <button id="copy" class="secondary">只复制当前聊天</button>
    <div id="status">请先打开一个 WhatsApp 客户聊天。</div>
    <script src="popup.js"></script>
  </body>
</html>
